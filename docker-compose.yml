

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - neo4j
    networks:
      - rag-net
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    networks:
      - rag-net

  neo4j:
    image: neo4j:5.12.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/madhukar
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - rag-net
    volumes:
      - neo4j_data:/data

networks:
  rag-net:
    driver: bridge

volumes:
  neo4j_data:
